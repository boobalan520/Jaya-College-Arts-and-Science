<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Edit Attendance - {{ student.name }}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            margin: 0 auto;
            padding: 30px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .info-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #28a745;
            color: white;
            width: 100%;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-primary:hover {
            background: #218838;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✏️ Edit Attendance</h1>
            <a href="{{ url_for('manage_attendance', student_id=student.id, year=student.year, section=student.section) }}" class="btn btn-secondary">← Cancel</a>
        </div>

        <div class="info-box">
            <p><strong>Student:</strong> {{ student.name }} ({{ student.register_number }})</p>
            <p><strong>Original Date:</strong> {{ attendance.date.strftime('%d-%m-%Y') }}</p>
            <p><strong>Original Period:</strong> Period {{ attendance.period }}</p>
        </div>

        <form method="POST">
            <div class="form-group">
                <label>📅 Date:</label>
                <input type="date" name="date" value="{{ attendance.date.strftime('%Y-%m-%d') }}" readonly disabled style="background: #f0f0f0;">
                <small style="color: #666;">Date cannot be changed. Delete and add new if needed.</small>
            </div>

            <div class="form-group">
                <label>⏰ Period:</label>
                <select name="period" required>
                    <option value="1" {% if attendance.period == 1 %}selected{% endif %}>Period 1 (3 points)</option>
                    <option value="2" {% if attendance.period == 2 %}selected{% endif %}>Period 2 (0.75 points)</option>
                    <option value="3" {% if attendance.period == 3 %}selected{% endif %}>Period 3 (0.75 points)</option>
                    <option value="4" {% if attendance.period == 4 %}selected{% endif %}>Period 4 (3 points)</option>
                    <option value="5" {% if attendance.period == 5 %}selected{% endif %}>Period 5 (0.75 points)</option>
                    <option value="6" {% if attendance.period == 6 %}selected{% endif %}>Period 6 (0.75 points)</option>
                </select>
            </div>

            <div class="form-group">
                <label>✅ Status:</label>
                <select name="status" required>
                    <option value="present" {% if attendance.status == 'present' %}selected{% endif %}>Present ✅</option>
                    <option value="absent" {% if attendance.status == 'absent' %}selected{% endif %}>Absent ❌</option>
                </select>
            </div>

            <div class="form-group">
                <label>📚 Subject:</label>
                <input type="text" name="subject" value="{{ attendance.subject }}" required>
            </div>

            <div class="form-group">
                <label>👨‍🏫 Marked By:</label>
                <select name="marked_by" required>
                    {% for staff_member in staff %}
                    <option value="{{ staff_member.id }}" {% if attendance.marked_by == staff_member.id %}selected{% endif %}>
                        {{ staff_member.name }} ({{ staff_member.subject }})
                    </option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit" class="btn btn-primary">💾 Save Changes</button>
        </form>
    </div>
</body>
</html>
