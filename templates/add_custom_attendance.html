<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Add Custom Attendance - {{ student.name }}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            margin: 0 auto;
            padding: 30px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .student-info {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #28a745;
            color: white;
            width: 100%;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-primary:hover {
            background: #218838;
            transform: translateY(-2px);
        }

        .note {
            background: #e8f4f8;
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 0.85em;
            color: #0066cc;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>➕ Add Custom Attendance</h1>
            <a href="{{ url_for('manage_attendance', student_id=student.id, year=year, section=section) }}" class="btn btn-secondary">← Cancel</a>
        </div>

        <div class="student-info">
            <p><strong>{{ student.name }}</strong></p>
            <p>{{ student.register_number }} | {{ year }} - Section {{ section }}</p>
        </div>

        <form method="POST">
            <div class="form-group">
                <label>📅 Date:</label>
                <input type="date" name="date" required max="{{ datetime.now().strftime('%Y-%m-%d') }}">
            </div>

            <div class="form-group">
                <label>⏰ Period:</label>
                <select name="period" required>
                    <option value="">Select Period</option>
                    <option value="1">Period 1 (3 points)</option>
                    <option value="2">Period 2 (0.75 points)</option>
                    <option value="3">Period 3 (0.75 points)</option>
                    <option value="4">Period 4 (3 points)</option>
                    <option value="5">Period 5 (0.75 points)</option>
                    <option value="6">Period 6 (0.75 points)</option>
                </select>
            </div>

            <div class="form-group">
                <label>✅ Status:</label>
                <select name="status" required>
                    <option value="present">Present ✅</option>
                    <option value="absent">Absent ❌</option>
                </select>
            </div>

            <div class="form-group">
                <label>📚 Subject:</label>
                <input type="text" name="subject" placeholder="e.g., Python, Java, DBMS" required>
            </div>

            <div class="form-group">
                <label>👨‍🏫 Marked By:</label>
                <select name="marked_by" required>
                    <option value="">Select Staff</option>
                    {% for staff_member in staff %}
                    <option value="{{ staff_member.id }}">{{ staff_member.name }} ({{ staff_member.subject }})</option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit" class="btn btn-primary">➕ Add Attendance</button>
        </form>

        <div class="note">
            <strong>💡 Note:</strong> You can add attendance for any past date. This is useful for back-dating records or correcting missed entries.
        </div>
    </div>
</body>
</html>
