<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Change Password - Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            padding: 30px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 1.8em;
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #28a745;
            color: white;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            margin-top: 10px;
        }

        .btn-primary:hover {
            background: #218838;
            transform: translateY(-2px);
        }

        .password-requirements {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.8em;
            color: #666;
        }

        .error-message {
            color: #dc3545;
            font-size: 0.8em;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 Change Password</h1>
            <p>Update your admin account password</p>
        </div>

        {% if session.password_message %}
        <div class="alert alert-{{ 'success' if '✅' in session.password_message else 'error' }}">
            {{ session.password_message }}
            {% set _ = session.pop('password_message', None) %}
        </div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label>Current Password</label>
                <input type="password" name="current_password" id="current_password" required>
            </div>

            <div class="form-group">
                <label>New Password</label>
                <input type="password" name="new_password" id="new_password" required>
                <div id="new_password_error" class="error-message"></div>
            </div>

            <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" name="confirm_password" id="confirm_password" required>
                <div id="confirm_error" class="error-message"></div>
            </div>

            <button type="submit" class="btn btn-primary">Change Password</button>
            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Cancel</a>
        </form>

        <div class="password-requirements">
            <strong>🔒 Password Requirements:</strong>
            <ul style="margin-left: 20px; margin-top: 5px;">
                <li>Minimum 6 characters</li>
                <li>Use a mix of letters and numbers</li>
            </ul>
        </div>
    </div>

    <script>
        const currentPassword = document.getElementById('current_password');
        const newPassword = document.getElementById('new_password');
        const confirmPassword = document.getElementById('confirm_password');
        const newPasswordError = document.getElementById('new_password_error');
        const confirmError = document.getElementById('confirm_error');

        function validateNewPassword() {
            if (newPassword.value.length > 0 && newPassword.value.length < 6) {
                newPasswordError.textContent = 'Password must be at least 6 characters';
                return false;
            } else {
                newPasswordError.textContent = '';
                return true;
            }
        }

        function checkPasswordMatch() {
            if (confirmPassword.value.length > 0 && newPassword.value !== confirmPassword.value) {
                confirmError.textContent = 'Passwords do not match';
                return false;
            } else {
                confirmError.textContent = '';
                return true;
            }
        }

        newPassword.addEventListener('keyup', function() {
            validateNewPassword();
            checkPasswordMatch();
        });
        
        confirmPassword.addEventListener('keyup', checkPasswordMatch);
    </script>
</body>
</html>
